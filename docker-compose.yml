      # Определяет, какой слушатель используется для связи между контроллерами в кворуме.
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
      # Уникальный идентификатор кластера Kafka. Должен быть одинаковым на всех узлах в кластере.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # Фактор репликации служебного топика "__consumer_offsets", где Kafka хранит смещения (offsets) потребителей.
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Задержка перед началом ребалансировки групп потребителей (в миллисекундах). 0 = мгновенная ребалансировка.
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Минимальное количество реплик (in-sync replicas), необходимых для записи в топик "__transaction_state".
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      # Фактор репликации топика "__transaction_state", используемого для транзакций.
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      # Фактор репликации для служебного топика координатора Shared Subscriptions.
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      # Минимальное количество синхронных реплик для топика Shared Coordinator.
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      # Путь к директории, где хранятся логи Kafka (данные топиков, метаданные, транзакции).
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    networks:
      - kafka-net

