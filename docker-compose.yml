services:
  kafka-1:
    image: apache/kafka:4.0.1
    hostname: kafka-1
    container_name: kafka-1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      # Уникальный идентификатор узла (брокера/контроллера) в кластере. Должен быть разным для каждого экземпляра.
      KAFKA_PROCESS_ROLES: "broker,controller"
      # Определяет, какие роли выполняет узел: брокер, контроллер или оба одновременно.
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      # Связывает имена слушателей (listeners) с используемыми протоколами безопасности.
      # В данном случае незашифрованный PLAINTEXT.
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093"
      # Список контроллеров кворума (в KRaft). Каждый элемент: NODE_ID@HOST:PORT.
      KAFKA_LISTENERS: "PLAINTEXT://:19092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092"
      # Определяет, на каких адресах и портах Kafka слушает подключения.
      # Можно указывать несколько типов слушателей для разных целей:
      # - PLAINTEXT — для внутреннего взаимодействия брокеров и клиентов внутри Docker сети.
      # - CONTROLLER — для коммуникации между контроллерами в кластере.
      # - PLAINTEXT_HOST — для доступа с хоста/внешних клиентов.
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      # Имя слушателя, который используется для связи между брокерами (репликации, внутренних операций).
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-1:19092,PLAINTEXT_HOST://localhost:9092"
      # Адреса и порты, которые брокер сообщает клиентам (приложениям), чтобы они знали, как подключаться к нему.
      # Отличаются от LISTENERS, если брокер работает в Docker или за NAT.
      # PLAINTEXT://kafka-1:19092 — для клиентов внутри Docker сети (используют hostname контейнера)
      # PLAINTEXT_HOST://localhost:9092 — для клиентов на хосте (через проброшенный порт)
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      # Определяет, какой слушатель используется для связи между контроллерами в кворуме.
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
      # Уникальный идентификатор кластера Kafka. Должен быть одинаковым на всех узлах в кластере.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # Фактор репликации служебного топика "__consumer_offsets", где Kafka хранит смещения (offsets) потребителей.
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Задержка перед началом ребалансировки групп потребителей (в миллисекундах). 0 = мгновенная ребалансировка.
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Минимальное количество реплик (in-sync replicas), необходимых для записи в топик "__transaction_state".
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      # Фактор репликации топика "__transaction_state", используемого для транзакций.
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      # Фактор репликации для служебного топика координатора Shared Subscriptions.
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      # Минимальное количество синхронных реплик для топика Shared Coordinator.
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      # Путь к директории, где хранятся логи Kafka (данные топиков, метаданные, транзакции).
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    networks:
      - kafka-net

